<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway WebSocket Test</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            color: #dcddde;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 { color: #5865f2; }
        .container { display: flex; gap: 20px; margin-top: 20px; }
        .panel {
            flex: 1;
            background: #16162a;
            padding: 15px;
            border-radius: 8px;
        }
        .log {
            background: #0f0f1a;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            font-size: 12px;
            border-radius: 4px;
            margin-top: 10px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #2a2a4a;
        }
        .log-entry.send { border-left-color: #5865f2; }
        .log-entry.receive { border-left-color: #3ba55c; }
        .log-entry.error { border-left-color: #f04747; }
        button {
            background: #5865f2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button:hover { background: #4752c4; }
        button:disabled { background: #2a2a4a; cursor: not-allowed; }
        input {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            color: #dcddde;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            margin: 5px 0;
        }
        .status {
            padding: 10px;
            background: #2a2a4a;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .status.connected { background: #3ba55c; }
        .status.disconnected { background: #f04747; }
    </style>
</head>
<body>
    <h1>🎮 Discord Clone - Gateway WebSocket Test</h1>
    <div class="status" id="status">Disconnected</div>

    <div class="container">
        <div class="panel">
            <h3>Controls</h3>
            <button onclick="connect()">Connect</button>
            <button onclick="disconnect()">Disconnect</button>
            <br><br>
            <input type="text" id="userId" placeholder="User ID (e.g., user_123)" value="user_123">
            <input type="text" id="guildIds" placeholder="Guild IDs (comma separated)" value="">
            <button onclick="identify()">Send IDENTIFY</button>
            <br><br>
            <button onclick="heartbeat()">Send HEARTBEAT (manual)</button>
            <br><br>
            <label>
                <input type="checkbox" id="autoHeartbeat" checked> Auto-heartbeat
            </label>
            <p style="font-size: 12px; color: #72767d;">
                Session ID: <span id="sessionId">-</span><br>
                Heartbeat Interval: <span id="heartbeatInterval">-</span>ms<br>
                Last Heartbeat: <span id="lastHeartbeat">-</span>
            </p>
        </div>

        <div class="panel" style="flex: 2;">
            <h3>Event Log</h3>
            <button onclick="clearLog()">Clear Log</button>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        let socket = null;
        let channel = null;
        let sessionId = null;
        let heartbeatInterval = null;
        let heartbeatTimer = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus(connected) {
            const statusDiv = document.getElementById('status');
            if (connected) {
                statusDiv.textContent = 'Connected ✓';
                statusDiv.className = 'status connected';
            } else {
                statusDiv.textContent = 'Disconnected ✗';
                statusDiv.className = 'status disconnected';
            }
        }

        function connect() {
            if (socket) {
                log('Already connected', 'error');
                return;
            }

            log('Connecting to gateway...', 'info');

            // Import Phoenix socket from CDN
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/phoenix@1.7.14/priv/static/phoenix.min.js';
            script.onload = () => {
                log('Phoenix.js loaded', 'info');
                const Socket = window.Phoenix.Socket;
                socket = new Socket('/gateway', {});
                socket.connect();

                socket.onOpen(() => {
                    log('Socket opened', 'info');
                });

                socket.onError((error) => {
                    log(`Socket error: ${JSON.stringify(error)}`, 'error');
                });

                socket.onClose(() => {
                    log('Socket closed', 'error');
                    updateStatus(false);
                    socket = null;
                    channel = null;
                    stopHeartbeat();
                });

                channel = socket.channel('gateway:connect', {});

                channel.on('message', (payload) => {
                    log(`← RECEIVE: ${JSON.stringify(payload, null, 2)}`, 'receive');
                    handleMessage(payload);
                });

                channel.join()
                    .receive('ok', (response) => {
                        log(`✓ Joined channel: ${JSON.stringify(response)}`, 'receive');
                        sessionId = response.session_id;
                        document.getElementById('sessionId').textContent = sessionId;
                        updateStatus(true);
                    })
                    .receive('error', (response) => {
                        log(`✗ Failed to join: ${JSON.stringify(response)}`, 'error');
                    });
            };
            document.head.appendChild(script);
        }

        function disconnect() {
            if (channel) {
                channel.leave();
            }
            if (socket) {
                socket.disconnect();
            }
            stopHeartbeat();
            socket = null;
            channel = null;
            updateStatus(false);
            log('Disconnected', 'info');
        }

        function handleMessage(payload) {
            const { op, d, t } = payload;

            switch (op) {
                case 10: // HELLO
                    log(`HELLO received - heartbeat_interval: ${d.heartbeat_interval}ms`, 'info');
                    heartbeatInterval = d.heartbeat_interval;
                    document.getElementById('heartbeatInterval').textContent = heartbeatInterval;
                    if (document.getElementById('autoHeartbeat').checked) {
                        startHeartbeat();
                    }
                    break;

                case 11: // HEARTBEAT_ACK
                    log('HEARTBEAT_ACK received', 'info');
                    document.getElementById('lastHeartbeat').textContent = new Date().toLocaleTimeString();
                    break;

                case 0: // DISPATCH
                    log(`DISPATCH: ${t} - ${JSON.stringify(d)}`, 'receive');
                    break;

                default:
                    log(`Unknown opcode: ${op}`, 'info');
            }
        }

        function send(opcode, data) {
            if (!channel) {
                log('Not connected', 'error');
                return;
            }

            const payload = { op: opcode, d: data };
            log(`→ SEND: ${JSON.stringify(payload, null, 2)}`, 'send');
            channel.push('message', payload);
        }

        function identify() {
            const userId = document.getElementById('userId').value;
            const guildIdsStr = document.getElementById('guildIds').value;
            const guildIds = guildIdsStr ? guildIdsStr.split(',').map(s => s.trim()) : [];

            send(2, { // IDENTIFY opcode
                user_id: userId,
                guilds: guildIds
            });
        }

        function heartbeat() {
            send(1, null); // HEARTBEAT opcode
        }

        function startHeartbeat() {
            if (heartbeatTimer) return;

            log(`Starting auto-heartbeat (every ${heartbeatInterval}ms)`, 'info');
            heartbeatTimer = setInterval(() => {
                heartbeat();
            }, heartbeatInterval);
        }

        function stopHeartbeat() {
            if (heartbeatTimer) {
                clearInterval(heartbeatTimer);
                heartbeatTimer = null;
                log('Stopped auto-heartbeat', 'info');
            }
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        // Auto-connect on page load
        window.addEventListener('load', () => {
            log('Page loaded. Click "Connect" to start.', 'info');
        });
    </script>
</body>
</html>
