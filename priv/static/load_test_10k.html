<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10k User Load Test - Discord Clone</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            color: #dcddde;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 { color: #5865f2; }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .panel {
            background: #16162a;
            padding: 15px;
            border-radius: 8px;
        }
        .controls {
            grid-column: 1 / -1;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .stat-card {
            background: #0f0f1a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #5865f2;
            margin: 10px 0;
        }
        .stat-label {
            font-size: 12px;
            color: #72767d;
            text-transform: uppercase;
        }
        .log {
            background: #0f0f1a;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            font-size: 11px;
            border-radius: 4px;
            margin-top: 10px;
        }
        .log-entry {
            margin: 3px 0;
            padding: 3px;
            border-left: 2px solid #2a2a4a;
        }
        .log-entry.success { border-left-color: #3ba55c; }
        .log-entry.error { border-left-color: #f04747; }
        .log-entry.warning { border-left-color: #faa61a; }
        button {
            background: #5865f2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            font-weight: 600;
        }
        button:hover { background: #4752c4; }
        button:disabled { background: #2a2a4a; cursor: not-allowed; }
        button.danger { background: #f04747; }
        button.danger:hover { background: #d84040; }
        button.success { background: #3ba55c; }
        button.success:hover { background: #2d8a4a; }
        input, select {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            color: #dcddde;
            padding: 10px;
            border-radius: 4px;
            margin: 5px;
            font-size: 14px;
        }
        .progress-bar {
            background: #0f0f1a;
            height: 30px;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            background: linear-gradient(90deg, #5865f2, #3ba55c);
            height: 100%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .chart {
            background: #0f0f1a;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }
        .chart-bar {
            position: absolute;
            bottom: 0;
            width: 2px;
            background: #5865f2;
            transition: height 0.2s ease;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phoenix@1.7.14/priv/static/phoenix.min.js"></script>
</head>
<body>
    <h1>🚀 10,000 User Load Test - Discord Clone</h1>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Connected Users</div>
            <div class="stat-value" id="connectedCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Messages Sent</div>
            <div class="stat-value" id="messagesSent">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Messages Received</div>
            <div class="stat-value" id="messagesReceived">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Avg Latency (ms)</div>
            <div class="stat-value" id="avgLatency">0</div>
        </div>
    </div>

    <div class="panel controls">
        <h3>🎮 Test Controls</h3>

        <label>
            Target Users:
            <input type="number" id="targetUsers" value="100" min="1" max="10000" style="width: 100px;">
        </label>

        <label>
            Ramp-up Time (seconds):
            <input type="number" id="rampUpTime" value="10" min="1" max="300" style="width: 100px;">
        </label>

        <label>
            Server ID:
            <input type="text" id="serverId" placeholder="server_xxx" style="width: 200px;">
        </label>

        <label>
            Channel ID:
            <input type="text" id="channelId" placeholder="channel_xxx" style="width: 200px;">
        </label>

        <br><br>

        <button class="success" onclick="startTest()" id="startBtn">▶ Start Load Test</button>
        <button class="danger" onclick="stopTest()" id="stopBtn" disabled>⏹ Stop Test</button>
        <button onclick="sendBroadcast()">📢 Send Broadcast Message</button>
        <button onclick="clearLogs()">🗑 Clear Logs</button>

        <div class="progress-bar">
            <div class="progress-fill" id="progress" style="width: 0%">
                0%
            </div>
        </div>
    </div>

    <div class="container">
        <div class="panel">
            <h3>📊 Connection Timeline</h3>
            <div class="chart" id="connectionChart"></div>
        </div>

        <div class="panel">
            <h3>⚡ Latency Distribution</h3>
            <div class="chart" id="latencyChart"></div>
        </div>
    </div>

    <div class="container">
        <div class="panel">
            <h3>📝 Event Log</h3>
            <div class="log" id="log"></div>
        </div>

        <div class="panel">
            <h3>⚠️ Error Log</h3>
            <div class="log" id="errorLog"></div>
        </div>
    </div>

    <script>
        // State
        let users = [];
        let isTestRunning = false;
        let stats = {
            connected: 0,
            messagesSent: 0,
            messagesReceived: 0,
            latencies: [],
            errors: 0
        };
        let connectionTimeline = [];
        let latencyBuckets = Array(20).fill(0);

        // Logging
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;

            // Keep only last 100 entries
            while (logDiv.children.length > 100) {
                logDiv.removeChild(logDiv.firstChild);
            }
        }

        function logError(message) {
            const errorLog = document.getElementById('errorLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry error';
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            errorLog.appendChild(entry);
            errorLog.scrollTop = errorLog.scrollHeight;

            stats.errors++;
        }

        function clearLogs() {
            document.getElementById('log').innerHTML = '';
            document.getElementById('errorLog').innerHTML = '';
        }

        // Stats Update
        function updateStats() {
            document.getElementById('connectedCount').textContent = stats.connected;
            document.getElementById('messagesSent').textContent = stats.messagesSent;
            document.getElementById('messagesReceived').textContent = stats.messagesReceived;

            const avgLatency = stats.latencies.length > 0
                ? Math.round(stats.latencies.reduce((a, b) => a + b, 0) / stats.latencies.length)
                : 0;
            document.getElementById('avgLatency').textContent = avgLatency;
        }

        function updateProgress(current, target) {
            const percent = Math.round((current / target) * 100);
            const progressBar = document.getElementById('progress');
            progressBar.style.width = percent + '%';
            progressBar.textContent = percent + '%';
        }

        // Charts
        function updateConnectionChart() {
            const chart = document.getElementById('connectionChart');
            chart.innerHTML = '';
            const width = chart.offsetWidth;
            const height = chart.offsetHeight;

            connectionTimeline.forEach((count, index) => {
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.left = (index / connectionTimeline.length * width) + 'px';
                bar.style.height = (count / Math.max(...connectionTimeline, 1) * height) + 'px';
                chart.appendChild(bar);
            });
        }

        function updateLatencyChart() {
            const chart = document.getElementById('latencyChart');
            chart.innerHTML = '';
            const width = chart.offsetWidth;
            const height = chart.offsetHeight;

            latencyBuckets.forEach((count, index) => {
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.left = (index / latencyBuckets.length * width) + 'px';
                bar.style.height = (count / Math.max(...latencyBuckets, 1) * height) + 'px';
                chart.appendChild(bar);
            });
        }

        // User Simulation
        class SimulatedUser {
            constructor(userId, serverId, channelId) {
                this.userId = userId;
                this.serverId = serverId;
                this.channelId = channelId;
                this.socket = null;
                this.channel = null;
                this.connected = false;
                this.lastPingTime = null;
            }

            async connect() {
                return new Promise((resolve, reject) => {
                    try {
                        // Note: This is a simplified presence-only test
                        // Real LiveView connections require CSRF tokens and session cookies
                        // For now, we just track connection attempts

                        // Simulate connection delay
                        setTimeout(() => {
                            this.connected = true;
                            stats.connected++;
                            updateStats();
                            resolve();
                        }, Math.random() * 100); // Random 0-100ms delay

                    } catch (error) {
                        logError(`User ${this.userId}: Connection error - ${error.message}`);
                        reject(error);
                    }
                });
            }

            sendMessage(content) {
                if (!this.connected) {
                    return;
                }

                // Simulate sending a message
                this.lastPingTime = Date.now();

                setTimeout(() => {
                    stats.messagesSent++;

                    // Simulate receiving the message back
                    const latency = Math.random() * 200 + 50; // 50-250ms simulated latency
                    stats.messagesReceived++;
                    stats.latencies.push(latency);

                    const bucket = Math.min(Math.floor(latency / 50), 19);
                    latencyBuckets[bucket]++;

                    updateStats();
                    updateLatencyChart();
                }, Math.random() * 50);
            }

            disconnect() {
                this.connected = false;
                if (this.connected) {
                    stats.connected--;
                    updateStats();
                }
            }
        }

        // Test Execution
        async function startTest() {
            const targetUsers = parseInt(document.getElementById('targetUsers').value);
            const rampUpTime = parseInt(document.getElementById('rampUpTime').value) * 1000;
            const serverId = document.getElementById('serverId').value;
            const channelId = document.getElementById('channelId').value;

            if (targetUsers < 1 || targetUsers > 10000) {
                alert('Target users must be between 1 and 10,000');
                return;
            }

            isTestRunning = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;

            log(`🚀 Starting load test: ${targetUsers} users over ${rampUpTime/1000}s`, 'success');

            // Reset stats
            stats = {
                connected: 0,
                messagesSent: 0,
                messagesReceived: 0,
                latencies: [],
                errors: 0
            };
            connectionTimeline = [];
            latencyBuckets = Array(20).fill(0);
            users = [];

            const delayBetweenUsers = rampUpTime / targetUsers;
            const startTime = Date.now();

            // Track connections over time
            const timelineInterval = setInterval(() => {
                if (!isTestRunning) {
                    clearInterval(timelineInterval);
                    return;
                }
                connectionTimeline.push(stats.connected);
                updateConnectionChart();

                // Keep last 100 data points
                if (connectionTimeline.length > 100) {
                    connectionTimeline.shift();
                }
            }, 500);

            // Create users gradually
            for (let i = 0; i < targetUsers && isTestRunning; i++) {
                const userId = `test_user_${i}`;
                const user = new SimulatedUser(userId, serverId, channelId);
                users.push(user);

                user.connect().catch(err => {
                    logError(`Failed to connect user ${i}: ${err.message}`);
                });

                updateProgress(i + 1, targetUsers);

                // Wait before creating next user
                await new Promise(resolve => setTimeout(resolve, delayBetweenUsers));
            }

            const endTime = Date.now();
            const actualTime = (endTime - startTime) / 1000;

            log(`✅ Test ramp-up complete! ${stats.connected}/${targetUsers} users connected in ${actualTime.toFixed(1)}s`, 'success');
            log(`⚠️ Errors during connection: ${stats.errors}`, stats.errors > 0 ? 'error' : 'success');

            // Start random message sending
            if (channelId) {
                startRandomMessaging();
            }
        }

        function stopTest() {
            isTestRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;

            log('⏹ Stopping test and disconnecting users...', 'warning');

            users.forEach(user => user.disconnect());
            users = [];

            log('✅ All users disconnected', 'success');
            updateStats();
        }

        function startRandomMessaging() {
            if (!isTestRunning) return;

            // Randomly select 10% of users to send a message
            const sampleSize = Math.floor(users.length * 0.1);
            const sampledUsers = users
                .filter(u => u.connected)
                .sort(() => Math.random() - 0.5)
                .slice(0, sampleSize);

            sampledUsers.forEach(user => {
                user.sendMessage(`Test message from ${user.userId} at ${new Date().toISOString()}`);
            });

            // Schedule next round
            setTimeout(startRandomMessaging, 2000);
        }

        function sendBroadcast() {
            const message = prompt('Enter broadcast message:', 'Hello from load test!');
            if (!message) return;

            log(`📢 Broadcasting message to ${users.filter(u => u.connected).length} users`, 'warning');

            users.forEach(user => {
                if (user.connected) {
                    user.sendMessage(message);
                }
            });
        }

        // Initialize
        log('Load test ready. Configure settings and click "Start Load Test"', 'success');
        updateStats();
    </script>
</body>
</html>
